#------------------- Basic Settings (recommended) -------------------

[Reference Sample]

    run_type = quick
    # quick: 40 redshift bins
    # fiducial: 160 redshift bins (require additional downloads and automatically handled by the code)

[Test Sample]

# Data

    test_type = source_catalog
    # [source_catalog, intensity_map] 
    # source_catalog: FITS or CSV table containing coordinates (RA/Dec or Glon/Glat or l/b; case-insensitive column names).
    # intensity_map: HEALPix map (NSIDE=2048). Out-of-footprint or masked area set to NaN, otherwise, provide weight/footprint map
    # A discrete count map (e.g., a source catalog read onto HEALPix) is also treated as an intensity map.
    
    test_data_file = source_catalog/test_data_0.75_1.0.pqt
    
    test_map_ordering = NEST
    # Intensity map only. [NEST, RING] 
    
    beam_fwhm_arcmin = 5
    # Intensity map only #scale of clustering
    # source catalog 0.5/h Mpc 1.24 arcmin
    
# Selection function (spatial footprint, masking, weighting are treated as the same concept)
    
    footprint_definition = user_defined
    # [user_defined, no_selection, auto_detection]
    # 'user_defined': Recommended, if the selection function is well understood
    # If a test random file is provided, this mode is selected automatically.
    #                 A spatial weight map may also be provided (not mutually exclusive),
    #                 but is required if no random file is given.
    # 'full_sky': xxx, 
    # Apply no selection; use all-sky pixels.
    #                 Any provided spatial weight map is ignored.
    # 'auto_detection': xxx, coarse footprint detection and suitable for source catalog
    # Run auto_footprint_detection on the test data file.
    #                   Any provided spatial weight map is ignored.
    # A rectangular cut can be applied in Advanced Settings. masking is provided

    test_random_file = source_catalog/test_rand_0.75_1.0.pqt
    #sdss_z0p15_rand.pqt
    # Source/intensity. To capture the selection function
    # Random source catalog (fits or csv), or Random intensity field (HEALPix 2048, same ordering as the data) 

    spatial_weight_map_file_1 = 
    # Type C/M. Can be a simple footprint map (0/1 for masked/unmasked areas) or continuous spatial weights
    spatial_weight_map_ordering_1 = RING
    # Type C/M. [NEST, RING] 
    
    spatial_weight_map_file_2 = 
    spatial_weight_map_ordering_2 = RING
    
    spatial_weight_map_file_3 = 
    spatial_weight_map_ordering_3 = RING
        
    per_source_weight_colname = 
    # Source catalog only. The column name specifying additional weights for each input source in data and random file (fits or csv)


[Output]
    filename = test_data_0.75_1.0_csfd.fits
    # Save output as a FITS file. Can also accept a custom path.



#------------------- Advanced Settings -------------------
    
[Test Sample Processing]
    
    template_cleaning = CSFD
    # Type C/M. [HI, CSFD]. leaving blank --> no cleaning
    
    filter_fwhm_deg = 
    # Type C/M. [2., 4., 8., 16., inf]. inf or leaving blank --> no filtering


[Error Estimation]    
    
    N_BS = 32
    # Number of bootstrap samples. Range between 10 and 1000.
    

[Optional Inputs] 

# Additional built-in masks (multiple choice)

    CSFD_cosmology_area = False
    fsky_25_low_dust = False
    fsky_50_low_dust = False
    fsky_75_low_dust = False
    globular_clusters_veto = False
    LMC_SMC_veto = False
    nearby_galaxy_clusters_veto = False
    Planck_point_source_veto = False
    SDSS_veto = False
    
# Additional rectangular cut

    rec_cut = False
    # Do rectangular cut or not. [True, False] 
    
    rec_cut_coord = Galactic
    # Coordinate system. [Galactic, Equatorial, Ecliptic]
    
    rec_include = True
    # Include or exclude the specified rectangular area. [True, False]
    
    rec_min_lat = 0.1
    rec_max_lat = 89.9
    rec_min_lon = 0.1
    rec_max_lon = 359.9
    # In degrees, latitude range = (-90,90), longtitude range = (0,360)

# Parallelization
    
    N_prl = 4
    # Number of CPUs.