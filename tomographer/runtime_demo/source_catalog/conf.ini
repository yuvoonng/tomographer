#============================== Basic Settings ==============================

[Run Type]

    run_type = quick
    # [quick, fiducial]
    # quick: 40 redshift bins
    # fiducial: 160 redshift bins (required files downloaded automatically)


[Test Sample]

# Data

    test_type = source_catalog
    # [source_catalog, intensity_map]
    # C. source_catalog: FITS or CSV table containing object coordinates
    #     (RA/Dec or Glon/Glat or l/b; case-insensitive column names).
    # M. intensity_map: HEALPix map (NSIDE=2048). Out-of-footprint or
    #     masked area set to NaN; otherwise, provide a weight/footprint map.
    # A discrete count map (e.g., a source catalog read onto HEALPix)
    #     is also treated as an intensity map.

    test_data_file =


# Selection function

    # Spatial selection function (base layer)
    # Footprint, veto masks, and spatial weighting are all represented as
    #     full-sky weight maps and multiplied together into a single
    #     selection function. Additional masks, rectangular cuts, and
    #     weight maps can be specified in Advanced Settings.

    footprint_definition =
    # [user_defined, full_sky, auto_detection]
    # user_defined: Recommended for science runs.
    #     Provide a random catalog (Type C) and/or a spatial weight map
    #     (Type C/M) below.
    # full_sky: Treat the full sky (Type C) or all non-NaN pixels
    #     (Type M) as valid. Useful for truly full-sky data, pre-masked
    #     intensity maps, or when using built-in masks in Advanced Settings.
    # auto_detection: Use with caution.
    #     Estimate a coarse footprint from the non-zero areas in the
    #     test data; susceptible to boundary effects.

    test_random_file =
    # Type C/M. Random source catalog (FITS/CSV) or random HEALPix
    #     intensity map. Used only when footprint_definition = user_defined.

    spatial_weight_map_file =
    # Type C/M. Footprint mask (0/1 or boolean) or continuous weight map.
    #     Used only when footprint_definition = user_defined.

    spatial_weight_map_ordering = RING
    # [NEST, RING]

    per_source_weight_colname =
    # Type C only. Column name for per-source weights in the data and
    #     random catalog.


[Output]

    output_prefix =
    # Prefix for all output files (may include a directory path).
    #     Creates <prefix>-ddz.fits, <prefix>-ddz.pdf, <prefix>-conf.ini
    #     (results table, plot, and configuration copy).



#============================ Advanced Settings =============================

[Test Sample Processing]

    template_cleaning =
    # Type C/M. [HI, CSFD]
    # Linearly regress out a foreground template from the test field.
    #     HI: Galactic HI from HI4PI (HI4PI Collaboration 2016).
    #     CSFD: Large-scale-structure-free Galactic dust map (Chiang 2023).
    #     Leave blank for no cleaning.

    filter_fwhm_deg =
    # Type C/M. [2., 4., 8., 16., inf]
    # High-pass filter the test field to suppress large-scale foregrounds
    #     and systematics. Leave blank or use inf for no filtering.


[Error Estimation]

    N_BS = 32
    # Number of bootstrap realizations using NSIDE=16 sky regions.
    #     Range: 10–1000. Use 10–30 for testing; 50+ for production.


[Optional Inputs]

# Built-in masks
# Enable any combination of predefined sky masks. All enabled masks are
# multiplied together with the base selection function.

    CSFD_cosmology_area = False
    # UV-optical-IR extragalactic sky outside high dust and WISE veto

    SDSS_veto = False
    # Veto bad imaging stripes/scans in the original SDSS imaging

    fsky_25_low_dust = False
    # Lowest 25% dust sky by CSFD E(B-V)

    fsky_50_low_dust = False
    # Lowest 50% dust sky by CSFD E(B-V)

    fsky_75_low_dust = False
    # Lowest 75% dust sky by CSFD E(B-V)

    globular_clusters_veto = False

    LMC_SMC_veto = False

    nearby_galaxy_clusters_veto = False

    Planck_point_source_veto = False


# Rectangular cut
# Apply an additional rectangular sky cut in the selected coordinate system.

    rec_cut = False
    # [True, False]

    rec_cut_coord = Galactic
    # [Galactic, Equatorial, Ecliptic]

    rec_include = True
    # Keep (True) or exclude (False) the specified region, e.g., exclude
    # |b| < 20° to remove the Galactic plane.

    rec_min_lat = -90
    rec_max_lat = 90
    rec_min_lon = 0
    rec_max_lon = 360
    # Degrees. Latitude in [-90, 90]; longitude in [0, 360].


# Additional spatial weight maps
# Same format as spatial_weight_map_file above. All masks and weight maps
#     are multiplied together.

    additional_weight_map_file_1 =
    additional_weight_map_ordering_1 = RING
    # [NEST, RING]

    additional_weight_map_file_2 =
    additional_weight_map_ordering_2 = RING
    # [NEST, RING]


# Parallelization

    N_prl = 4
    # Number of CPUs.