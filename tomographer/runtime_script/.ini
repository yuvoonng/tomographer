#------------------- Basic Settings (recommended) -------------------

[Test Sample]

# Data

    test_type = source_catalog
    # [source_catalog, intensity_map] 
    # C. source_catalog: FITS or CSV table containing coordinates 
    #                    (RA/Dec or Glon/Glat or l/b; case-insensitive column names).
    # M. intensity_map: HEALPix map (NSIDE=2048).
    #                   Out-of-footprint or masked area set to NaN, otherwise, provide weight/footprint map
    # A discrete count map (e.g., a source catalog read onto HEALPix) is also treated as an intensity map.
    
    test_data_file = cib_cluster_good.pqt
    
    test_map_ordering = NEST
    # Type M only. [NEST, RING] 
    
    beam_fwhm_arcmin = 1.24
    # Type M only
    
# Selection function (spatial footprint, masking, weighting are treated as the same concept)

    test_random_file = 
    # Type C/M. To capture the selection function
    # Random source catalog (fits or csv), or
    # Random intensity field (HEALPix 2048, same ordering as the data) 
    
    footprint_definition = no_selection
    # [user_defined, no_selection, auto_detection]
    # 'user_defined': If a test random file is provided, this mode is selected automatically.
    #                 A spatial weight map may also be provided (not mutually exclusive),
    #                 but is required if no random file is given.
    # 'no_selection': Apply no selection; use all-sky pixels.
    #                 Any provided spatial weight map is ignored.
    #                 A rectangular cut can be applied in Advanced Settings after selecting this mode.
    # 'auto_detection': Run auto_footprint_detection on the test data file.
    #                   Any provided spatial weight map is ignored.
    
    spatial_weight_map_file_1 = 
    # Type C/M. Can be a simple footprint map (0/1 for masked/unmasked areas) or continuous spatial weights
    spatial_weight_map_ordering_1 = NEST
    # Type C/M. [NEST, RING] 
    
    spatial_weight_map_file_2 = 
    spatial_weight_map_ordering_2 = NEST
    
    spatial_weight_map_file_3 = 
    spatial_weight_map_ordering_3 = NEST
        
    per_source_weight_colname = 
    # Type C only. The column name specifying additional weights for each input source in data and random file (fits or csv)


